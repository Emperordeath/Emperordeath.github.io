<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Em breve...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #000000;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(circle, #1a1a1a, #000000);
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      letter-spacing: 3px;
      color: #ff0000;
      text-shadow: 0 0 15px #ff0000, 0 0 30px #8b0000;
      margin-bottom: 20px;
    }

    .glitch {
      display: inline-block;
      animation: glitch 1.2s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px #ff0000, -2px -2px #00ffff; }
      25% { text-shadow: -2px 2px #ff0000, 2px -2px #00ffff; }
      50% { text-shadow: 2px -2px #ff0000, -2px 2px #00ffff; }
      75% { text-shadow: -2px -2px #ff0000, 2px 2px #00ffff; }
      100% { text-shadow: 2px 2px #ff0000, -2px -2px #00ffff; }
    }

    a.discord-link {
      margin-top: 40px;
      font-size: 1.2rem;
      text-decoration: none;
      background: #ff0000;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff0000, 0 0 20px #8b0000;
      transition: 0.3s ease;
    }

    a.discord-link:hover {
      background: #8b0000;
      box-shadow: 0 0 20px #ff0000, 0 0 40px #8b0000;
    }

    footer {
      font-size: 0.9rem;
      color: #333;
      position: absolute;
      bottom: 15px;
    }
  </style>
</head>
<body>

  <h1>ESTOU REFORMULANDO O SITE<br><span class="glitch">0_0</span></h1>

  <a class="discord-link" href="https://discord.gg/dvV4SHkTpg" target="_blank">⚒️ Entre no Discord</a>

  <footer>© 2025 IamEmperorDeath</footer>

</body>
</html>
